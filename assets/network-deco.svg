<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Biological/physics network decoration — iPoLS France
       Represents research networks: clustered nodes (labs/cities)
       connected by long-range edges (collaborations).
       Used as CSS background-image; all elements are white
       so the container's opacity controls visibility. -->

  <!-- edges -->
  <g stroke="white" stroke-width="0.9" fill="none">
    <!-- cluster A (top-left) -->
    <line x1="44" y1="78" x2="86" y2="56"/>
    <line x1="44" y1="78" x2="70" y2="112"/>
    <line x1="86" y1="56" x2="112" y2="84"/>
    <line x1="70" y1="112" x2="112" y2="84"/>
    <line x1="70" y1="112" x2="96" y2="132"/>
    <line x1="112" y1="84" x2="96" y2="132"/>
    <!-- cluster B (centre-top) -->
    <line x1="222" y1="50" x2="256" y2="78"/>
    <line x1="222" y1="50" x2="276" y2="56"/>
    <line x1="256" y1="78" x2="236" y2="118"/>
    <line x1="256" y1="78" x2="276" y2="56"/>
    <line x1="236" y1="118" x2="290" y2="106"/>
    <line x1="276" y1="56" x2="290" y2="106"/>
    <!-- cluster C (top-right) -->
    <line x1="386" y1="66" x2="426" y2="46"/>
    <line x1="386" y1="66" x2="412" y2="96"/>
    <line x1="426" y1="46" x2="412" y2="96"/>
    <line x1="426" y1="46" x2="456" y2="72"/>
    <line x1="412" y1="96" x2="444" y2="126"/>
    <line x1="456" y1="72" x2="444" y2="126"/>
    <!-- cluster D (bottom-left) -->
    <line x1="50" y1="276" x2="90" y2="256"/>
    <line x1="50" y1="276" x2="74" y2="312"/>
    <line x1="90" y1="256" x2="74" y2="312"/>
    <line x1="90" y1="256" x2="118" y2="286"/>
    <line x1="74" y1="312" x2="100" y2="332"/>
    <line x1="118" y1="286" x2="100" y2="332"/>
    <!-- cluster E (bottom-right) -->
    <line x1="376" y1="276" x2="416" y2="256"/>
    <line x1="376" y1="276" x2="400" y2="308"/>
    <line x1="416" y1="256" x2="400" y2="308"/>
    <line x1="416" y1="256" x2="446" y2="280"/>
    <line x1="400" y1="308" x2="430" y2="338"/>
    <line x1="446" y1="280" x2="430" y2="338"/>
    <!-- bridge hub 1 — inter-cluster (left-centre) -->
    <line x1="96" y1="132" x2="160" y2="174"/>
    <line x1="86" y1="56" x2="160" y2="174"/>
    <line x1="236" y1="118" x2="160" y2="174"/>
    <line x1="290" y1="106" x2="160" y2="174"/>
    <!-- bridge hub 2 — inter-cluster (right-centre) -->
    <line x1="256" y1="78" x2="316" y2="180"/>
    <line x1="290" y1="106" x2="316" y2="180"/>
    <line x1="386" y1="66" x2="316" y2="180"/>
    <line x1="444" y1="126" x2="316" y2="180"/>
    <!-- hub 1 ↔ hub 2 -->
    <line x1="160" y1="174" x2="316" y2="180"/>
    <!-- lower bridge -->
    <line x1="160" y1="174" x2="250" y2="256"/>
    <line x1="316" y1="180" x2="250" y2="256"/>
    <line x1="90" y1="256" x2="250" y2="256"/>
    <line x1="118" y1="286" x2="250" y2="256"/>
    <line x1="376" y1="276" x2="250" y2="256"/>
    <line x1="416" y1="256" x2="316" y2="180"/>
    <!-- far-right peripheral -->
    <line x1="426" y1="46" x2="550" y2="156"/>
    <line x1="456" y1="72" x2="550" y2="156"/>
    <line x1="550" y1="156" x2="534" y2="290"/>
    <line x1="446" y1="280" x2="534" y2="290"/>
    <line x1="430" y1="338" x2="534" y2="290"/>
  </g>

  <!-- nodes -->
  <g fill="white">
    <!-- cluster A -->
    <circle cx="44"  cy="78"  r="3"/>
    <circle cx="86"  cy="56"  r="4.5"/>
    <circle cx="70"  cy="112" r="2.5"/>
    <circle cx="112" cy="84"  r="3.5"/>
    <circle cx="96"  cy="132" r="3"/>
    <!-- cluster B -->
    <circle cx="222" cy="50"  r="3"/>
    <circle cx="256" cy="78"  r="5"/>
    <circle cx="236" cy="118" r="2.5"/>
    <circle cx="276" cy="56"  r="3"/>
    <circle cx="290" cy="106" r="3.5"/>
    <!-- cluster C -->
    <circle cx="386" cy="66"  r="3"/>
    <circle cx="426" cy="46"  r="4"/>
    <circle cx="412" cy="96"  r="2.5"/>
    <circle cx="456" cy="72"  r="3"/>
    <circle cx="444" cy="126" r="3.5"/>
    <!-- cluster D -->
    <circle cx="50"  cy="276" r="3"/>
    <circle cx="90"  cy="256" r="4.5"/>
    <circle cx="74"  cy="312" r="2.5"/>
    <circle cx="118" cy="286" r="3.5"/>
    <circle cx="100" cy="332" r="3"/>
    <!-- cluster E -->
    <circle cx="376" cy="276" r="3"/>
    <circle cx="416" cy="256" r="4"/>
    <circle cx="400" cy="308" r="2.5"/>
    <circle cx="446" cy="280" r="3.5"/>
    <circle cx="430" cy="338" r="3"/>
    <!-- hub nodes (bridge/coordinator — larger) -->
    <circle cx="160" cy="174" r="6"/>
    <circle cx="316" cy="180" r="5.5"/>
    <circle cx="250" cy="256" r="3.5"/>
    <!-- peripheral -->
    <circle cx="550" cy="156" r="3.5"/>
    <circle cx="534" cy="290" r="3"/>
  </g>
</svg>
